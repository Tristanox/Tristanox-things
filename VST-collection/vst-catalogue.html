    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #07090f;
      --surface: #0d1017;
      --card:    #111520;
      --border:  rgba(255,255,255,0.07);
      --accent:  #5b9cf6;
      --text:    #dde3ef;

      --synth:   #a78bfa;
      --effect:  #fb923c;

    html, body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; font-size: 15px; }
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;

      opacity: 0.025;
    }
    .orb { position: fixed; border-radius: 50%; pointer-events: none; filter: blur(100px); z-index: 0; }
    .orb-1 { width: 500px; height: 500px; background: #1a3a6e; top: -180px; right: -120px; opacity: 0.5; }
    .orb-2 { width: 400px; height: 400px; background: #2d1b5e; bottom: -100px; left: -100px; opacity: 0.45; }

    .page { position: relative; z-index: 1; max-width: 1080px; margin: 0 auto; padding: 0 28px 80px; }
    header { padding: 72px 0 48px; }
    .eyebrow { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; opacity: 0.85; }
    h1 { font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 700; letter-spacing: -0.025em; line-height: 1.1; }
    .sub { margin-top: 12px; color: var(--muted); font-size: 14px; font-weight: 300; }

    /* ── CONTROLS ── */
    .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 40px; }
    .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 360px; }
    .search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    input[type="search"] {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 11px 14px 11px 42px;
      color: var(--text); font-family: 'Outfit', sans-serif; font-size: 14px; outline: none;
      transition: border-color 0.2s;
    }
    input[type="search"]:focus { border-color: rgba(91,156,246,0.4); }
    input[type="search"]::placeholder { color: var(--muted); }

    .filters { display: flex; gap: 6px; }
    .f-btn {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 9px 16px; color: var(--muted); font-family: 'Outfit', sans-serif;
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.18s;
    }
    .f-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
    .f-btn.active-all   { border-color: rgba(91,156,246,0.4); color: var(--accent); background: rgba(91,156,246,0.07); }
    .f-btn.active-synth { border-color: rgba(167,139,250,0.4); color: var(--synth); background: rgba(167,139,250,0.07); }
    .f-btn.active-effect{ border-color: rgba(251,146,60,0.4);  color: var(--effect); background: rgba(251,146,60,0.07); }
    .f-btn.active-starred { border-color: rgba(250,204,21,0.5); color: #facc15; background: rgba(250,204,21,0.07); }
    .f-btn.star-btn { font-size: 16px; padding: 7px 13px; line-height: 1; }

    /* ── GRID ── */
    .grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
    @media (max-width: 820px) { .grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 520px) { .grid { grid-template-columns: 1fr; } }

    /* ── CARD ── */
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
      overflow: hidden; display: flex; flex-direction: column;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      animation: up 0.4s ease both;
    }
    .card:hover { border-color: rgba(91,156,246,0.22); transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.35); }
    @keyframes up { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

    .card-img {
      width: 100%; aspect-ratio: 16/9; background: #0a0d16;
      overflow: hidden; display: flex; align-items: center; justify-content: center;
      position: relative; cursor: pointer;
    }
    .card-img img { width:100%; height:100%; object-fit:cover; transition:transform 0.35s; display:block; }
    .card:hover .card-img img { transform: scale(1.04); }
    .placeholder { color:var(--muted); font-size:11px; letter-spacing:0.1em; text-transform:uppercase; }

    /* zoom hint */
    .zoom-hint {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0); transition: background 0.2s; pointer-events: none;
    }
    .zoom-hint svg { opacity: 0; transform: scale(0.8); transition: opacity 0.2s, transform 0.2s; color: white; }
    .card-img:hover .zoom-hint { background: rgba(0,0,0,0.35); }
    .card-img:hover .zoom-hint svg { opacity: 1; transform: scale(1); }

    /* type badge on image */
    .type-badge {
      position: absolute; top: 9px; left: 9px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
      border-radius: 6px; padding: 3px 9px;
    }
    .type-badge.synth  { background: rgba(167,139,250,0.15); border: 1px solid rgba(167,139,250,0.3); color: var(--synth); }
    .type-badge.effect { background: rgba(251,146,60,0.12);  border: 1px solid rgba(251,146,60,0.3);  color: var(--effect); }

    /* star on image */
    .star-badge {
      position: absolute; top: 8px; right: 8px;
      font-size: 14px; line-height: 1;
      filter: drop-shadow(0 1px 4px rgba(0,0,0,0.6));
    }

    .card-body { padding: 14px 16px 16px; display:flex; flex-direction:column; gap:10px; flex:1; }
    .card-name { font-size:14px; font-weight:600; letter-spacing:-0.01em; }
    .card-desc { font-size:12px; color:var(--muted); line-height:1.55; flex:1; }
    .card-foot { display:flex; align-items:center; justify-content:space-between; gap:8px; }
    .btn-get {
      display:inline-flex; align-items:center; gap:7px;
      background: rgba(91,156,246,0.1); border: 1px solid rgba(91,156,246,0.22);
      border-radius:8px; padding:7px 14px; color:var(--accent);
      font-family:'Outfit',sans-serif; font-size:12px; font-weight:600;
      letter-spacing:0.02em; text-decoration:none; transition:all 0.18s;
    }
    .btn-get:hover { background:rgba(91,156,246,0.18); border-color:rgba(91,156,246,0.5); }
    .free-badge { font-size:10px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--green); border:1px solid rgba(74,222,128,0.18); border-radius:6px; padding:3px 8px; }

    .empty { grid-column:1/-1; text-align:center; padding:64px 0; color:var(--muted); font-size:13px; }

    /* ── LIGHTBOX ── */
    #lightbox {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(4,6,12,0.92); backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    #lightbox.open { opacity: 1; pointer-events: all; }
    #lightbox img {
      max-width: min(900px, 92vw); max-height: 85vh;
      border-radius: 12px; box-shadow: 0 32px 80px rgba(0,0,0,0.7);
      transform: scale(0.94); transition: transform 0.25s;
      display: block;
    }
    #lightbox.open img { transform: scale(1); }
    #lb-close {
      position: fixed; top: 22px; right: 26px;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 8px 14px;
      color: var(--muted); font-family: 'Outfit', sans-serif; font-size: 12px;
      cursor: pointer; letter-spacing: 0.05em; transition: all 0.18s;
    }
    #lb-close:hover { color: var(--text); background: rgba(255,255,255,0.1); }

    footer { border-top:1px solid var(--border); margin-top:72px; padding-top:28px; font-size:12px; color:var(--muted); }
  </style>
</head>

let activeFilter = 'all';
let searchQuery  = '';

function card(p, i) {
  const typeBadge = p.type
    ? `<span class="type-badge ${p.type}">${p.type}</span>` : '';

  const starBadge = p.isstarred ? `<span class="star-badge">★</span>` : '';

  const imgContent = p.img
    ? `<img src="${p.img}" alt="${p.name}" loading="lazy"
         onerror="this.parentElement.querySelector('.zoom-hint') && (this.style.display='none'); this.insertAdjacentHTML('afterend','<span class=\\'placeholder\\'>no preview</span>')">`
    : `<span class="placeholder">no preview</span>`;

  const zoomHint = p.img ? `
    <div class="zoom-hint">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        <line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
      </svg>
    </div>` : '';

  const desc = p.desc ? `<p class="card-desc">${p.desc}</p>` : '';
  const clickAttr = p.img ? `onclick="openLb('${p.img.replace(/'/g,"\\'")}','${p.name.replace(/'/g,"\\'")}')"`  : '';

  return `
  <div class="card" style="animation-delay:${i*45}ms">
    <div class="card-img" ${clickAttr}>
      ${imgContent}
      ${typeBadge}
      ${starBadge}
      ${zoomHint}
    </div>
    <div class="card-body">
      <div class="card-name">${p.name}</div>
      ${desc}
      <div class="card-foot">
        <a class="btn-get" href="${p.url}" target="_blank" rel="noopener">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Télécharger
        </a>
        <span class="free-badge">free</span>
      </div>
    </div>
  </div>`;
}

function render() {
  const list = PLUGINS.filter(p => {
    const fOk = activeFilter === 'all' || activeFilter === 'starred'
      ? (activeFilter === 'starred' ? p.isstarred === 1 : true)
      : p.type === activeFilter;
    const qOk = !searchQuery || p.name.toLowerCase().includes(searchQuery) || (p.desc||'').toLowerCase().includes(searchQuery);
    return fOk && qOk;
  });
  document.getElementById('grid').innerHTML = list.length
    ? list.map((p,i) => card(p,i)).join('')
    : '<div class="empty">Aucun plugin trouvé.</div>';
}

/* ── Filters ── */
document.querySelectorAll('.f-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeFilter = btn.dataset.f;
    document.querySelectorAll('.f-btn').forEach(b => b.className = 'f-btn');
    btn.classList.add(activeFilter === 'starred' ? 'active-starred' : 'active-' + activeFilter);
    render();
  });
});

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value.toLowerCase().trim();
  render();
});

/* ── Lightbox ── */
function openLb(src, alt) {
  const lb = document.getElementById('lightbox');
  const img = document.getElementById('lb-img');
  img.src = src; img.alt = alt;
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLb() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('lb-close').addEventListener('click', closeLb);
document.getElementById('lightbox').addEventListener('click', e => { if (e.target === e.currentTarget) closeLb(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLb(); });

render();
</script>
</body>
</html>
