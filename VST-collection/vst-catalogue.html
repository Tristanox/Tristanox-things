    header { padding: 72px 0 56px; }
    .eyebrow { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; opacity: 0.85; }
    h1 { font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 700; letter-spacing: -0.025em; line-height: 1.1; }
    .sub { margin-top: 12px; color: var(--muted); font-size: 14px; font-weight: 300; }
    .search-wrap { position: relative; margin-bottom: 48px; max-width: 400px; }
    .search-wrap svg { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
    input[type="search"] {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 11px 14px 11px 42px;
      color: var(--text); font-family: 'Outfit', sans-serif; font-size: 14px; outline: none;
      transition: border-color 0.2s;
    }
    input[type="search"]:focus { border-color: rgba(91,156,246,0.4); }
    input[type="search"]::placeholder { color: var(--muted); }
    .grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
    @media (max-width: 820px) { .grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 520px) { .grid { grid-template-columns: 1fr; } }
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
      overflow: hidden; display: flex; flex-direction: column;
      transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      animation: up 0.4s ease both;
    }
    .card:hover { border-color: rgba(91,156,246,0.25); transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.35); }
    @keyframes up { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    .card-img { width:100%; aspect-ratio:16/9; background:#0a0d16; overflow:hidden; display:flex; align-items:center; justify-content:center; }
    .card-img img { width:100%; height:100%; object-fit:cover; transition:transform 0.35s; display:block; }
    .card:hover .card-img img { transform: scale(1.04); }
    .placeholder { color:var(--muted); font-size:11px; letter-spacing:0.1em; text-transform:uppercase; }
    .card-body { padding: 16px 18px 18px; display:flex; flex-direction:column; gap:12px; flex:1; }
    .card-name { font-size:15px; font-weight:600; letter-spacing:-0.01em; }
    .card-desc { font-size:12.5px; color:var(--muted); line-height:1.55; flex:1; }
    .card-foot { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-top:2px; }
    .btn-get {
      display:inline-flex; align-items:center; gap:7px;
      background: rgba(91,156,246,0.1); border: 1px solid rgba(91,156,246,0.22);
      border-radius:8px; padding:7px 15px; color:var(--accent);
      font-family:'Outfit',sans-serif; font-size:12px; font-weight:600;
      letter-spacing:0.02em; text-decoration:none; transition:all 0.18s;
    }

    .free-badge { font-size:10px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:var(--green); border:1px solid rgba(74,222,128,0.2); border-radius:6px; padding:3px 8px; }
    .empty { grid-column:1/-1; text-align:center; padding:64px 0; color:var(--muted); font-size:13px; }
    footer { border-top:1px solid var(--border); margin-top:72px; padding-top:28px; font-size:12px; color:var(--muted); }

function card(p, i) {
  const img = p.img
    ? `<img src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.parentElement.innerHTML='<span class=\\'placeholder\\'>no preview</span>'">`
    : `<span class="placeholder">no preview</span>`;
  const desc = p.desc ? `<p class="card-desc">${p.desc}</p>` : '';
  return `
  <div class="card" style="animation-delay:${i*50}ms">
    <div class="card-img">${img}</div>
    <div class="card-body">
      <div class="card-name">${p.name}</div>
      ${desc}
      <div class="card-foot">
        <a class="btn-get" href="${p.url}" target="_blank" rel="noopener">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Télécharger
        </a>
        <span class="free-badge">free</span>
      </div>
    </div>
  </div>`;
}

function render(q) {
  const list = q
    ? PLUGINS.filter(p => p.name.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q))
    : PLUGINS;
  document.getElementById('grid').innerHTML = list.length
    ? list.map((p,i) => card(p,i)).join('')
    : '<div class="empty">Aucun plugin trouvé.</div>';
}

document.getElementById('search').addEventListener('input', e => render(e.target.value.toLowerCase().trim()));
render('');
</script>
</body>
